name: Generate Snake

on:
  schedule:
    - cron: "30 6 * * *" # daily ~06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: mahesh-diwan
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?color_schema=dark
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_branch: output
          destination_dir: .
          keep_files: true
