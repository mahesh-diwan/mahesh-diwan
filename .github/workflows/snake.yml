name: Generate Snake

on:
  schedule:
    - cron: "30 6 * * *" # daily ~06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: mahesh-diwan
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?color_schema=dark
            assets/github-snake-colorful.svg?color_snake=%2300D4FF&color_dots=%23161b22,%235c6bc0,%237e57c2,%23ab47bc,%23ec407a
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh snake animation [skip ci]"
          file_pattern: "assets/github-snake*.svg"
