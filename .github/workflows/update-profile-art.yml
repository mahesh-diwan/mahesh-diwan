name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *" # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache rembg model
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: u2net-${{ runner.os }}
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/prep_photo.py
      - run: python scripts/make_ascii_svg.py
      - run: python scripts/make_info_card.py
      - run: python scripts/fetch_contributions.py
      - run: python scripts/render_heatmap_svg.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: "assets/source-prepped.png assets/mahesh-ascii.svg assets/info-card.svg data/contributions.json assets/contrib-heatmap.svg"
